<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stratmap</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --text: #1a1a18;
    --text2: #6b6b66;
    --text3: #9e9d98;
    --border: rgba(0,0,0,0.1);
    --font: 'Noto Sans JP', 'Hiragino Sans', system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252522;
      --text: #e8e7e1;
      --text2: #9e9d98;
      --text3: #5f5e5a;
      --border: rgba(255,255,255,0.1);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 3rem 1.5rem 5rem;
    max-width: 760px;
    margin: 0 auto;
  }
  header { margin-bottom: 3rem; }
  .logo {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo span { color: var(--text3); }
  .tagline {
    font-size: 13px;
    color: var(--text2);
    margin-top: 6px;
  }
  h2 {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 1rem;
  }
  .tools {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .tool-card {
    display: block;
    padding: 1.1rem 1.25rem;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    color: inherit;
    transition: border-color .15s;
  }
  .tool-card:hover { border-color: rgba(0,0,0,0.25); }
  @media (prefers-color-scheme: dark) {
    .tool-card:hover { border-color: rgba(255,255,255,0.25); }
  }
  .tool-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }
  .tool-desc {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
  }
  .tool-tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    border: 0.5px solid var(--border);
    color: var(--text3);
    margin-top: 10px;
  }
  .wip {
    font-size: 11px;
    color: var(--text3);
    padding: 2rem 0 0;
    border-top: 0.5px solid var(--border);
    margin-top: 2rem;
  }
</style>
</head>
<body>
<header>
  <div class="logo">strat<span>map</span></div>
  <p class="tagline">ビジネス戦略の仮説を、軸に分解して可視化する</p>
</header>

<h2>Tools</h2>
<div class="tools">
  <a class="tool-card" href="src/customer-hypothesis.html">
    <div class="tool-name">想定顧客マッピング</div>
    <p class="tool-desc">セグメント・意思決定・課題・関係の4グループ17軸で顧客仮説を可視化する</p>
    <span class="tool-tag">顧客</span>
  </a>
  <a class="tool-card" href="src/value-proposition.html">
    <div class="tool-name">提供価値マッピング</div>
    <p class="tool-desc">種類・位置づけ・届き方・確からしさの4グループ16軸で提供価値の仮説を可視化する</p>
    <span class="tool-tag">提供価値</span>
  </a>
  <!-- 今後のツールをここに追加 -->
</div>

<p class="wip">提供価値・提供方法・競合ポジションなどのツールを順次追加予定</p>
</body>
</html>
