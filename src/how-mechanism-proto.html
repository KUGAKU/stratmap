<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提供メカニズム設計（プロト）</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeede9;
    --text: #1a1a18;
    --text2: #6b6b66;
    --text3: #9e9d98;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --font: 'Noto Sans JP', 'Hiragino Sans', system-ui, sans-serif;
    --accent: #1D9E75;
    --accent-light: rgba(29,158,117,0.08);
    --accent-mid: rgba(29,158,117,0.2);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252522;
      --bg3: #2e2e2b;
      --text: #e8e7e1;
      --text2: #9e9d98;
      --text3: #5f5e5a;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --accent: #3CC99A;
      --accent-light: rgba(60,201,154,0.08);
      --accent-mid: rgba(60,201,154,0.18);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem;
    max-width: 880px;
    margin: 0 auto;
  }

  header { margin-bottom: 1.5rem; }
  h1 { font-size: 18px; font-weight: 500; }
  .subtitle { font-size: 13px; color: var(--text2); margin-top: 4px; }

  .center-score {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 1.5rem;
    padding: 16px;
    background: var(--accent-light);
    border-radius: 12px;
    border: 0.5px solid var(--accent-mid);
  }
  .center-score .big-num {
    font-size: 36px;
    font-weight: 500;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .center-score .score-label {
    font-size: 12px;
    color: var(--text2);
  }
  .center-score .score-sub {
    font-size: 11px;
    color: var(--text3);
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    position: relative;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--accent-mid); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }
  .card-value {
    font-size: 22px;
    font-weight: 500;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  .card-desc {
    font-size: 11px;
    color: var(--text3);
    line-height: 1.5;
    margin-bottom: 12px;
    min-height: 2em;
  }

  .card-gauge {
    width: 100%;
    height: 6px;
    background: var(--bg3);
    border-radius: 3px;
    position: relative;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .card-gauge-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.15s ease-out;
    opacity: 0.7;
  }

  .card input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    border-radius: 2px;
    background: var(--bg3);
    outline: none;
    cursor: pointer;
  }
  .card input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    border: 2.5px solid var(--bg);
    box-shadow: 0 0 0 1px var(--accent-mid);
    cursor: pointer;
    transition: transform .1s;
  }
  .card input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }
  .card input[type=range]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    border: 2.5px solid var(--bg);
    cursor: pointer;
  }

  .card-scale {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--text3);
    margin-top: 4px;
  }

  .reset-wrap {
    display: flex;
    justify-content: flex-end;
    margin-top: 1rem;
  }
  .reset-btn {
    font-size: 12px;
    font-family: var(--font);
    padding: 5px 14px;
    border: 0.5px solid var(--border);
    border-radius: 99px;
    cursor: pointer;
    background: transparent;
    color: var(--text2);
  }
  .reset-btn:hover { background: var(--bg2); }

  @media (max-width: 560px) {
    body { padding: 1rem; }
    h1 { font-size: 16px; }
    .cards { grid-template-columns: 1fr; gap: 10px; }
    .card { padding: 14px; }
    .center-score .big-num { font-size: 28px; }
  }

  @media (min-width: 769px) {
    .cards { grid-template-columns: repeat(4, 1fr); }
    .card-desc { min-height: 3em; }
  }
</style>
</head>
<body>

<header>
  <h1>提供メカニズム設計</h1>
  <p class="subtitle">価値を届けるビジネス構造を、8つの要素で整理する</p>
</header>

<div class="center-score" id="center-score"></div>

<div class="cards" id="cards"></div>

<div class="reset-wrap">
  <button class="reset-btn" onclick="resetAll()">リセット</button>
  <button class="reset-btn" onclick="exportAll()">エクスポート</button>
  <button class="reset-btn" onclick="document.getElementById('import-file').click()">インポート</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importAll(this.files[0])">
</div>

<script>
// ---- Persistence ----
const STORAGE_KEY = 'stratmap';
function loadStore() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function saveSection(section, data) { const s = loadStore(); s.version = 1; s.updatedAt = new Date().toISOString(); s[section] = data; localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
function loadSection(section) { return loadStore()[section] || null; }
function exportAll() { const s = loadStore(); const b = new Blob([JSON.stringify(s, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'stratmap-' + new Date().toISOString().slice(0,10) + '.json'; a.click(); }
function importAll(file) { if (!file) return; const r = new FileReader(); r.onload = (e) => { try { localStorage.setItem(STORAGE_KEY, e.target.result); location.reload(); } catch { alert('JSONファイルの読み込みに失敗しました'); } }; r.readAsText(file); }
function saveThis() { saveSection('howMechanism', { values: {...values} }); }

const MECHANISMS = [
  { id: 'channel',    label: 'チャネル適合',     desc: '顧客が普段いる場所で届けられるか' },
  { id: 'format',     label: '提供形態',         desc: 'プロダクト/サービスの形が顧客に合っているか' },
  { id: 'customize',  label: 'カスタマイズ余地', desc: '顧客ごとの事情に合わせられる柔軟性' },
  { id: 'relation',   label: '関係性モデル',     desc: 'セルフサーブ/伴走/コミュニティ等の深さ' },
  { id: 'revenue',    label: '収益モデル',       desc: '課金の仕組みが価値実感と一致しているか' },
  { id: 'pricing',    label: '価格妥当性',       desc: '顧客の期待する費用対効果に見合うか' },
  { id: 'ops',        label: '運用負荷',         desc: '自社が持続的に回せるオペレーション量か' },
  { id: 'scale',      label: '拡張余地',         desc: '事業拡大時にスケールできる構造か' },
];

let values = {};
MECHANISMS.forEach(m => values[m.id] = 5);

function buildCards() {
  const wrap = document.getElementById('cards');
  MECHANISMS.forEach(m => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">${m.label}</div>
        <div class="card-value" id="cv-${m.id}">5</div>
      </div>
      <div class="card-desc">${m.desc}</div>
      <div class="card-gauge">
        <div class="card-gauge-fill" id="gf-${m.id}" style="width:50%"></div>
      </div>
      <input type="range" min="1" max="10" value="5" step="1" id="sl-${m.id}">
      <div class="card-scale"><span>1</span><span>5</span><span>10</span></div>
    `;
    wrap.appendChild(card);

    card.querySelector('input').addEventListener('input', function() {
      values[m.id] = +this.value;
      update();
      saveThis();
    });
  });
}

function update() {
  MECHANISMS.forEach(m => {
    const v = values[m.id];
    document.getElementById('cv-' + m.id).textContent = v;
    document.getElementById('gf-' + m.id).style.width = (v / 10 * 100) + '%';
  });
  updateCenter();
}

function updateCenter() {
  const wrap = document.getElementById('center-score');
  const vals = MECHANISMS.map(m => values[m.id]);
  const avg = (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1);
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const weakest = MECHANISMS[vals.indexOf(min)].label;

  let strength = '要検討';
  if (avg >= 7) strength = '強い構造';
  else if (avg >= 5) strength = 'バランス型';
  else if (avg >= 3) strength = '要強化';

  wrap.innerHTML = `
    <div>
      <div class="big-num">${avg}</div>
    </div>
    <div>
      <div class="score-label">${strength}　|　最弱: ${weakest} (${min})</div>
      <div class="score-sub">8要素の平均スコア（range: ${min}–${max}）</div>
    </div>
  `;
}

function resetAll() {
  MECHANISMS.forEach(m => {
    values[m.id] = 5;
    document.getElementById('sl-' + m.id).value = 5;
  });
  update();
  saveThis();
}

// Restore
(function restore() {
  const saved = loadSection('howMechanism');
  if (saved && saved.values) Object.assign(values, saved.values);
})();
buildCards();
// Sync sliders with restored values
MECHANISMS.forEach(m => {
  const sl = document.getElementById('sl-' + m.id);
  if (sl) sl.value = values[m.id];
});
update();
</script>
</body>
</html>
