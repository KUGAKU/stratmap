<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stratmap AI インタビュー</title>
<style>
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
    --text: #1a1a18; --text2: #6b6b66; --text3: #9e9d98;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
    --font: 'Noto Sans JP', 'Hiragino Sans', system-ui, sans-serif;
    --good: #1D9E75; --mid: #C4873B; --warn: #D85A30; --accent: #2D7FF9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252522; --bg3: #2e2e2b;
      --text: #e8e7e1; --text2: #9e9d98; --text3: #5f5e5a;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.18);
      --good: #3CC99A; --mid: #E0A84C; --warn: #E8734A; --accent: #5B9BFF;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    padding: 12px 16px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .header h1 { font-size: 15px; font-weight: 500; }

  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Chat panel */
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.ai {
    background: var(--bg2);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .msg.user {
    background: var(--accent);
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .msg .mapping-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    margin-top: 6px;
    margin-right: 4px;
  }
  .mapping-badge.confident { background: rgba(29,158,117,0.15); color: var(--good); }
  .mapping-badge.inferred { background: rgba(196,135,59,0.15); color: var(--mid); }

  .chat-input {
    padding: 12px 16px;
    border-top: 0.5px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .chat-input textarea {
    flex: 1;
    font-family: var(--font);
    font-size: 13px;
    padding: 10px 14px;
    border: 0.5px solid var(--border2);
    border-radius: 12px;
    background: var(--bg);
    color: var(--text);
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 120px;
  }
  .chat-input textarea:focus { border-color: var(--accent); }
  .chat-input button {
    font-family: var(--font);
    font-size: 13px;
    padding: 0 20px;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .chat-input button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Preview panel */
  .preview-panel {
    width: 320px;
    border-left: 0.5px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    flex-shrink: 0;
  }

  .preview-section {
    margin-bottom: 20px;
  }
  .preview-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .comp-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
    font-size: 11px;
  }
  .comp-label { min-width: 60px; color: var(--text2); }
  .comp-bar { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .comp-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .comp-pct { min-width: 32px; text-align: right; font-weight: 500; font-variant-numeric: tabular-nums; }

  .mapping-list { display: flex; flex-direction: column; gap: 4px; }
  .mapping-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 11px;
  }
  .mapping-item.confident { background: rgba(29,158,117,0.08); }
  .mapping-item.inferred { background: rgba(196,135,59,0.08); }
  .mapping-item.unknown { color: var(--text3); }
  .mapping-item .m-label { color: var(--text2); }
  .mapping-item .m-val { font-weight: 500; }
  .mapping-item .m-conf { font-size: 9px; color: var(--text3); margin-left: 4px; }

  .section-header {
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    margin-top: 10px;
    margin-bottom: 4px;
    padding-bottom: 3px;
    border-bottom: 0.5px solid var(--border);
  }

  .action-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn {
    font-size: 11px;
    font-family: var(--font);
    padding: 5px 12px;
    border: 0.5px solid var(--border2);
    border-radius: 99px;
    cursor: pointer;
    background: transparent;
    color: var(--text2);
    text-decoration: none;
  }
  .btn:hover { background: var(--bg2); }

  .loading { opacity: 0.5; font-style: italic; }

  /* Mobile */
  @media (max-width: 768px) {
    .main { flex-direction: column; }
    .preview-panel {
      width: 100%;
      border-left: none;
      border-top: 0.5px solid var(--border);
      max-height: 40vh;
    }
    .chat-messages { padding: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>stratmap AI インタビュー</h1>
  <div class="action-btns" id="actions" style="display:none;">
    <a class="btn" id="btn-export" href="#" target="_blank">エクスポート</a>
    <a class="btn" id="btn-report" href="#" target="_blank">レポート</a>
  </div>
</div>

<div class="main">
  <div class="chat-panel">
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input">
      <textarea id="input" rows="1" placeholder="戦略について自由にお話しください..." onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="send()">送信</button>
    </div>
  </div>
  <div class="preview-panel" id="preview">
    <div class="preview-section">
      <div class="preview-title">完了度</div>
      <div id="completion"></div>
    </div>
    <div class="preview-section">
      <div class="preview-title">マッピング</div>
      <div id="mapping-list"></div>
    </div>
  </div>
</div>

<script>
let sessionId = null;
let allMappings = {};
let sending = false;

const SECTION_LABELS = {
  who: 'Who', what: 'What',
  howJourney: 'Journey', howMechanism: 'Mechanism', howCross: 'Cross'
};

async function init() {
  const res = await fetch('/session', { method: 'POST' });
  const data = await res.json();
  sessionId = data.session_id;
  addMessage('ai', data.response);
  updateCompletion(data.completion);
  document.getElementById('actions').style.display = 'flex';
  document.getElementById('btn-export').href = '/session/' + sessionId + '/export';
  document.getElementById('btn-report').href = '/session/' + sessionId + '/report';
}

function addMessage(role, text, mappings) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  let html = text;
  if (mappings && mappings.length > 0) {
    html += '<br>';
    mappings.forEach(m => {
      html += `<span class="mapping-badge ${m.confidence}">${m.axis}: ${m.value}</span>`;
    });
  }
  div.innerHTML = html;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function addLoading() {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai loading';
  div.id = 'loading-msg';
  div.textContent = '考え中...';
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function removeLoading() {
  const el = document.getElementById('loading-msg');
  if (el) el.remove();
}

async function send() {
  if (sending) return;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  sending = true;
  document.getElementById('send-btn').disabled = true;
  input.value = '';
  addMessage('user', text);
  addLoading();

  try {
    const res = await fetch(`/session/${sessionId}/message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    removeLoading();

    if (!res.ok) {
      const err = await res.json();
      addMessage('ai', '(エラー: ' + (err.detail || 'Unknown error') + ')');
      return;
    }

    const data = await res.json();
    addMessage('ai', data.response, data.mappings_updated);
    updateCompletion(data.completion);

    // Update mappings
    data.mappings_updated.forEach(m => {
      allMappings[m.section + '.' + m.axis] = m;
    });
    renderMappings();

    if (data.is_complete) {
      addMessage('ai', '✅ 十分な情報が集まりました。右パネルの「エクスポート」からstratmap形式で出力できます。もちろん、さらに詳しく話を続けることもできます。');
    }
  } catch (e) {
    removeLoading();
    addMessage('ai', '(通信エラー: ' + e.message + ')');
  } finally {
    sending = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function updateCompletion(completion) {
  const wrap = document.getElementById('completion');
  let html = '';
  for (const [key, val] of Object.entries(completion)) {
    const pct = Math.round(val * 100);
    const color = pct >= 80 ? 'var(--good)' : pct >= 40 ? 'var(--mid)' : 'var(--text3)';
    html += `
      <div class="comp-row">
        <span class="comp-label">${SECTION_LABELS[key] || key}</span>
        <div class="comp-bar"><div class="comp-fill" style="width:${pct}%;background:${color}"></div></div>
        <span class="comp-pct" style="color:${color}">${pct}%</span>
      </div>`;
  }
  wrap.innerHTML = html;
}

function renderMappings() {
  const wrap = document.getElementById('mapping-list');
  const sections = {};

  for (const [key, m] of Object.entries(allMappings)) {
    const s = m.section;
    if (!sections[s]) sections[s] = [];
    sections[s].push(m);
  }

  let html = '';
  for (const [s, items] of Object.entries(sections)) {
    html += `<div class="section-header">${SECTION_LABELS[s] || s}</div><div class="mapping-list">`;
    items.forEach(m => {
      html += `
        <div class="mapping-item ${m.confidence}">
          <span class="m-label">${m.axis}</span>
          <span><span class="m-val">${m.value}</span><span class="m-conf">${m.confidence === 'confident' ? '確定' : '推測'}</span></span>
        </div>`;
    });
    html += '</div>';
  }
  wrap.innerHTML = html;
}

// Auto-resize textarea
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

init();
</script>
</body>
</html>
